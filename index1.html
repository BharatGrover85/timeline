<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Goal Timeline – Track Your Journey</title>
    <style>
        /* ─── ROOT VARIABLES ─── */
        :root {
            --bg: #06060d;
            --surface: #111119;
            --surface2: #181825;
            --border: #252535;
            --text: #e0e0e8;
            --text2: #a0a0b8;
            --accent: #00c6a7;
            --accent2: #5b9cf5;
            --accent-glow: rgba(0, 198, 167, 0.3);
            --danger: #f04770;
            --warning: #f5a623;
            --success: #2ecc71;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono: 'JetBrains Mono', monospace;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s ease;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* ─── RESET ─── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            background-image: radial-gradient(ellipse at 20% 10%, rgba(0, 198, 167, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(91, 156, 245, 0.04) 0%, transparent 60%);
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        /* ─── PARTICLES ─── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ─── LOGIN SCREEN ─── */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        #loginScreen .login-box {
            background: var(--surface);
            padding: 32px 28px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        #loginScreen h2 {
            text-align: center;
            margin-bottom: 22px;
            color: #fff;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }
        #loginScreen .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: var(--font);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 12px;
        }
        #loginScreen .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 198, 167, 0.15);
        }
        #loginScreen .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
        }
        #loginScreen .btn-primary:hover {
            box-shadow: 0 0 24px var(--accent-glow);
            transform: scale(1.01);
        }
        #loginScreen .btn-primary:active {
            transform: scale(0.97);
        }
        #loginError {
            color: var(--danger);
            margin-top: 12px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        /* ─── APP CONTAINER ─── */
        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            min-height: 100dvh;
            display: none;
            /* hidden until login */
            flex-direction: column;
            padding: 0 16px 80px 16px;
        }

        /* ─── HERO ─── */
        .hero-section {
            text-align: center;
            padding: 30px 12px 20px;
        }
        .hero-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            background: var(--surface2);
            border: 1px solid var(--border);
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
            font-weight: 600;
        }
        .hero-title {
            font-size: clamp(1.6rem, 6vw, 3.2rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #c0c0d0 40%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            word-break: break-word;
            line-height: 1.2;
        }
        .hero-subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.05rem);
            color: var(--text2);
            max-width: 550px;
            margin: 0 auto 14px;
            padding: 0 8px;
        }
        .hero-countdown-wrap {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .countdown-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            min-width: 60px;
            text-align: center;
            backdrop-filter: blur(10px);
            flex: 1;
            max-width: 80px;
        }
        .countdown-box .num {
            font-family: var(--mono);
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .countdown-box .lbl {
            font-size: 0.55rem;
            text-transform: uppercase;
            color: var(--text2);
            margin-top: 3px;
            letter-spacing: 0.04em;
        }
        .countdown-box.urgent {
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(240, 71, 112, 0.2);
        }
        .countdown-box.urgent .num {
            color: var(--danger);
        }
        .progress-bar-wrap {
            max-width: 400px;
            margin: 0 auto;
            height: 6px;
            background: var(--surface2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.6s ease;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .progress-label {
            font-size: 0.75rem;
            color: var(--text2);
            margin-top: 6px;
        }

        /* ─── SYNC STATUS ─── */
        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: var(--text2);
            padding: 3px 12px;
            border-radius: 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            margin-top: 8px;
        }
        .sync-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .sync-status .dot.online {
            background: var(--success);
        }
        .sync-status .dot.offline {
            background: var(--danger);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* ─── TIMELINE ─── */
        .timeline-wrapper {
            flex: 1;
            padding: 10px 4px 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            position: relative;
        }
        .timeline-line {
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, transparent 0%, var(--border) 5%, var(--accent) 50%, var(--border) 95%, transparent 100%);
            border-radius: 10px;
            z-index: 0;
        }
        .timeline-entries {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .timeline-entry {
            position: relative;
            margin-left: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 16px 16px 18px;
            transition: var(--transition);
            backdrop-filter: blur(6px);
            min-height: 90px;
        }
        .timeline-entry:hover {
            border-color: #3a3a52;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }
        .timeline-entry.completed {
            border-color: rgba(46, 204, 113, 0.4);
            background: rgba(46, 204, 113, 0.04);
        }
        .timeline-entry.completed .entry-title {
            text-decoration: line-through;
            text-decoration-color: var(--success);
        }
        .timeline-entry.overdue {
            border-color: rgba(240, 71, 112, 0.5);
            box-shadow: 0 0 20px rgba(240, 71, 112, 0.1);
        }
        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 22px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--surface);
            border: 3px solid var(--accent);
            z-index: 2;
            box-shadow: 0 0 14px var(--accent-glow);
            flex-shrink: 0;
        }
        .timeline-entry.completed .timeline-dot {
            background: var(--success);
            border-color: var(--success);
            box-shadow: 0 0 18px rgba(46, 204, 113, 0.5);
        }
        .timeline-entry.overdue .timeline-dot {
            border-color: var(--danger);
            box-shadow: 0 0 18px rgba(240, 71, 112, 0.5);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 14px rgba(240, 71, 112, 0.4);
            }
            50% {
                box-shadow: 0 0 28px rgba(240, 71, 112, 0.9);
            }
        }
        .entry-header {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .entry-number {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--accent);
            background: rgba(0, 198, 167, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 600;
            white-space: nowrap;
        }
        .entry-title {
            font-size: clamp(1rem, 3vw, 1.15rem);
            font-weight: 700;
            color: #fff;
            word-break: break-word;
        }
        .entry-desc {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 6px;
            word-break: break-word;
        }
        .entry-deadline {
            font-size: 0.7rem;
            color: var(--text2);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .entry-deadline svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
            flex-shrink: 0;
        }
        .entry-countdown {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .entry-countdown .mini-box {
            background: var(--surface2);
            border-radius: 6px;
            padding: 6px 8px;
            min-width: 38px;
            text-align: center;
            border: 1px solid var(--border);
            flex: 1;
            max-width: 56px;
        }
        .entry-countdown .mini-num {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }
        .entry-countdown .mini-lbl {
            font-size: 0.5rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .entry-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            margin-top: 6px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: underline;
            text-underline-offset: 2px;
            user-select: none;
            touch-action: manipulation;
        }
        .entry-status:hover {
            opacity: 0.8;
            filter: brightness(1.2);
        }
        .entry-status:active {
            transform: scale(0.95);
        }
        .status-completed {
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
        }
        .status-overdue {
            background: rgba(240, 71, 112, 0.15);
            color: var(--danger);
        }
        .status-ongoing {
            background: rgba(91, 156, 245, 0.12);
            color: var(--accent2);
        }
        .entry-link-btn {
            position: absolute;
            bottom: 14px;
            right: 14px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            z-index: 2;
        }
        .entry-link-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 14px var(--accent-glow);
        }
        .entry-link-btn:active {
            transform: scale(0.9);
        }

        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text2);
        }
        .empty-state .icon {
            font-size: 2.4rem;
            margin-bottom: 8px;
        }
        .empty-state h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 4px;
        }
        .empty-state p {
            font-size: 0.85rem;
        }

        /* ─── FAB (Settings gear) ─── */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            touch-action: manipulation;
        }
        .fab:hover {
            border-color: var(--accent);
            box-shadow: 0 0 28px var(--accent-glow);
            transform: scale(1.06);
        }
        .fab:active {
            transform: scale(0.92);
        }
        .fab svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* ─── PIN OVERLAY ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
            padding: 20px;
        }
        .overlay.active {
            display: flex;
        }
        .pin-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        .pin-modal h3 {
            color: #fff;
            margin-bottom: 6px;
            font-size: 1.2rem;
        }
        .pin-modal p {
            color: var(--text2);
            font-size: 0.85rem;
            margin-bottom: 14px;
        }
        .pin-input {
            width: 100%;
            padding: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 1.3rem;
            text-align: center;
            letter-spacing: 0.3em;
            font-family: var(--mono);
            outline: none;
        }
        .pin-input:focus {
            border-color: var(--accent);
        }
        .pin-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }
        .pin-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ─── SETTINGS DRAWER ─── */
        .settings-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 92%;
            max-width: 480px;
            height: 100vh;
            height: 100dvh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 300;
            transition: right 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
        }
        .settings-drawer.open {
            right: 0;
        }
        .drawer-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .drawer-header h3 {
            font-size: 1.1rem;
            color: #fff;
        }
        .drawer-close {
            background: none;
            border: none;
